<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfriMeet — Meeting Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--green:#1B4332;--green3:#40916C;--mint:#74C69D;--black:#0A0F0A;--black2:#111711;--white:#F8FAF8;--gray:#6B7F6B;--border:rgba(116,198,157,0.15);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
    .card{background:var(--black2);border:1px solid var(--border);border-radius:20px;padding:3rem;max-width:500px;width:100%;text-align:center;}
    .logo{font-size:1.5rem;font-weight:800;color:var(--white);margin-bottom:2rem;}
    .logo span{color:var(--mint);}
    .room-name{background:rgba(116,198,157,0.08);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.5rem;}
    .room-label{font-size:0.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--mint);font-weight:700;margin-bottom:0.35rem;}
    .room-value{font-size:1.1rem;font-weight:700;color:var(--white);}
    .btn{display:block;width:100%;padding:1rem;border-radius:12px;font-family:inherit;font-size:0.95rem;font-weight:700;cursor:pointer;border:none;margin-bottom:0.75rem;transition:opacity 0.2s;}
    .btn:hover{opacity:0.88;}
    .btn-primary{background:var(--green3);color:white;}
    .btn-copy{background:rgba(116,198,157,0.1);border:1px solid var(--border);color:var(--mint);}
    .btn-leave{background:rgba(220,50,50,0.1);border:1px solid rgba(220,50,50,0.3);color:#ff6b6b;}
    .info{font-size:0.82rem;color:var(--gray);line-height:1.7;margin-top:1rem;}
    .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:var(--green3);color:white;padding:0.75rem 1.5rem;border-radius:50px;font-size:0.85rem;font-weight:600;display:none;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Afri<span>Meet</span></div>
  <div class="room-name">
    <div class="room-label">Your Room</div>
    <div class="room-value" id="room-display">Loading...</div>
  </div>
  <button class="btn btn-primary" onclick="openMeeting()">Join Meeting Room</button>
  <button class="btn btn-copy" onclick="copyLink()">Copy Meeting Link</button>
  <button class="btn btn-leave" onclick="window.location.href='index.html'">Back to Home</button>
  <p class="info">Your meeting opens in a new tab using secure video. Share the link above with anyone you want to invite.</p>
</div>
<div class="toast" id="toast"></div>
<script>
const params = new URLSearchParams(window.location.search);
const roomName = params.get('room') || 'afrimeet-' + Math.random().toString(36).substr(2,6);
document.getElementById('room-display').textContent = roomName;

function openMeeting() {
  const jitsiRoom = 'AfriMeet-' + roomName;
  window.open('https://meet.jit.si/' + encodeURIComponent(jitsiRoom), '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const t = document.getElementById('toast');
    t.textContent = 'Link copied!';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  });
}
</script>
</body>
</html>
