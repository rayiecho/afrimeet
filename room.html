<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfriMeet — Meeting Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--green:#1B4332;--green3:#40916C;--mint:#74C69D;--black:#0A0F0A;--black2:#111711;--white:#F8FAF8;--gray:#6B7F6B;--border:rgba(116,198,157,0.15);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--black);color:var(--white);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    
    /* TOPBAR */
    .topbar{height:56px;background:var(--black2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;}
    .topbar-logo{font-size:1rem;font-weight:800;color:var(--white);}
    .topbar-logo span{color:var(--mint);}
    .topbar-room{font-size:0.82rem;color:var(--gray);display:flex;align-items:center;gap:0.5rem;}
    .topbar-room strong{color:var(--white);}
    .topbar-actions{display:flex;gap:0.75rem;align-items:center;}
    .topbar-btn{background:rgba(116,198,157,0.1);border:1px solid var(--border);color:var(--mint);padding:0.4rem 1rem;border-radius:6px;font-family:inherit;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .topbar-btn:hover{background:rgba(116,198,157,0.2);}
    .topbar-btn.danger{background:rgba(220,50,50,0.1);border-color:rgba(220,50,50,0.3);color:#ff6b6b;}
    .topbar-btn.danger:hover{background:rgba(220,50,50,0.2);}

    /* MAIN */
    .main{flex:1;position:relative;overflow:hidden;}
    #jitsi-container{width:100%;height:100%;}

    /* LOADING */
    .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--black);z-index:10;gap:1.5rem;}
    .loading-icon{width:72px;height:72px;background:var(--green3);border-radius:20px;display:flex;align-items:center;justify-content:center;}
    .loading-icon svg{width:36px;height:36px;fill:white;}
    .loading h2{font-size:1.3rem;font-weight:800;color:var(--white);}
    .loading p{font-size:0.88rem;color:var(--gray);}
    .loading-bar{width:200px;height:3px;background:rgba(116,198,157,0.1);border-radius:2px;overflow:hidden;}
    .loading-fill{height:100%;background:var(--green3);border-radius:2px;animation:load 2s ease-in-out infinite;}
    @keyframes load{0%{width:0%}50%{width:70%}100%{width:100%}}

    /* COPY TOAST */
    .copy-toast{position:fixed;top:4rem;left:50%;transform:translateX(-50%);background:var(--green3);color:white;padding:0.6rem 1.5rem;border-radius:50px;font-size:0.82rem;font-weight:600;display:none;z-index:999;}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Afri<span>Meet</span></div>
  <div class="topbar-room">Room: <strong id="room-display">Loading...</strong></div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="copyLink()">Copy Link</button>
    <button class="topbar-btn danger" onclick="leaveRoom()">Leave</button>
  </div>
</div>

<div class="main">
  <div class="loading" id="loading">
    <div class="loading-icon">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h12a1 1 0 001-1v-3.5l4 4v-11l-4 4z"/></svg>
    </div>
    <h2>Joining your meeting...</h2>
    <p id="loading-room">Setting up your room</p>
    <div class="loading-bar"><div class="loading-fill"></div></div>
  </div>
  <div id="jitsi-container"></div>
</div>

<div class="copy-toast" id="copy-toast">Link copied!</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const roomName = params.get('room') || 'afrimeet-' + Math.random().toString(36).substr(2,6);
const displayName = params.get('name') || '';

document.getElementById('room-display').textContent = roomName;
document.getElementById('loading-room').textContent = 'Room: ' + roomName;

setTimeout(() => {
  document.getElementById('loading').style.display = 'none';

  const api = new JitsiMeetExternalAPI('meet.jit.si', {
    roomName: 'AfriMeet-' + roomName,
    parentNode: document.getElementById('jitsi-container'),
    width: '100%',
    height: '100%',
    userInfo: { displayName: displayName || 'AfriMeet User' },
    configOverwrite: {
      startWithAudioMuted: false,
      startWithVideoMuted: false,
      enableWelcomePage: false,
      prejoinPageEnabled: true,
      disableDeepLinking: true,
      toolbarButtons: ['microphone','camera','closedcaptions','desktop','fullscreen','fodeviceselection','hangup','chat','recording','livestreaming','etherpad','sharedvideo','settings','raisehand','videoquality','filmstrip','feedback','stats','shortcuts','tileview','select-background','download','help','mute-everyone'],
    },
    interfaceConfigOverwrite: {
      SHOW_JITSI_WATERMARK: false,
      SHOW_WATERMARK_FOR_GUESTS: false,
      SHOW_BRAND_WATERMARK: false,
      BRAND_WATERMARK_LINK: '',
      APP_NAME: 'AfriMeet',
      NATIVE_APP_NAME: 'AfriMeet',
      DEFAULT_BACKGROUND: '#0A0F0A',
      DEFAULT_LOCAL_DISPLAY_NAME: 'You',
      TOOLBAR_ALWAYS_VISIBLE: false,
    }
  });

  api.addEventListener('readyToClose', () => leaveRoom());
}, 1500);

function copyLink() {
  const link = window.location.href;
  navigator.clipboard.writeText(link).then(() => {
    const t = document.getElementById('copy-toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  });
}

function leaveRoom() {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
